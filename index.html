<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0a1e; color: #e0d7f7; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .player-card { 
            background: linear-gradient(145deg, #1c1433, #251b47); width: 100%; max-width: 350px; 
            border-radius: 25px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; margin-bottom: 20px;
        }
        #track-art { width: 180px; height: 180px; border-radius: 20px; object-fit: cover; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); background: #3d2e6e; }
        #track-name { font-size: 18px; font-weight: bold; margin: 10px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; }
        .btn-ctrl { background: none; border: none; color: #a29bfe; font-size: 30px; cursor: pointer; transition: 0.2s; }
        .btn-ctrl:active { transform: scale(0.9); color: #6c5ce7; }
        .play-pause { font-size: 50px; }
        .add-btn { background: #6c5ce7; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 20px; }
        .playlist { width: 100%; max-width: 350px; }
        .track-item { 
            background: rgba(28, 20, 51, 0.6); border: 1px solid #3d2e6e; padding: 12px; 
            border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; cursor: pointer;
        }
        .track-item.active { border-color: #a29bfe; background: #251b47; }
        .track-item img { width: 40px; height: 40px; border-radius: 5px; margin-right: 12px; }
    </style>
</head>
<body>

    <div class="player-card">
        <img id="track-art" src="https://via.placeholder.com/180?text=Violet+Player" alt="Art">
        <div id="track-name">Выберите трек</div>
        
        <div class="controls">
            <button class="btn-ctrl" onclick="prevTrack()">⏮</button>
            <button class="btn-ctrl play-pause" id="play-btn" onclick="togglePlay()">▶️</button>
            <button class="btn-ctrl" onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <button class="add-btn" onclick="tg.sendData('load_playlist')">➕ ДОБАВИТЬ МУЗЫКУ</button>

    <div class="playlist" id="playlist-container">
        <p style="text-align:center; opacity:0.5;">Загрузка песен...</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let songs = [];
        let currentIndex = 0;
        let isPlaying = false;

        function loadSongs() {
            fetch('songs.json?v=' + Math.random())
                .then(res => res.json())
                .then(data => {
                    songs = data;
                    renderPlaylist();
                })
                .catch(e => {
                    document.getElementById('playlist-container').innerHTML = '<p>Плейлист пуст</p>';
                });
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = '';
            songs.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `track-item ${index === currentIndex ? 'active' : ''}`;
                item.onclick = () => selectTrack(index);
                // Пытаемся вытащить ID видео для обложки
                const videoId = song.url.split('v=')[1]?.split('&')[0] || '';
                const thumb = videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : 'https://via.placeholder.com/40';
                
                item.innerHTML = `
                    <img src="${thumb}">
                    <span style="font-size:14px;">${song.title}</span>
                `;
                container.appendChild(item);
            });
        }

        function selectTrack(index) {
            currentIndex = index;
            const song = songs[currentIndex];
            document.getElementById('track-name').innerText = song.title;
            
            const videoId = song.url.split('v=')[1]?.split('&')[0];
            if(videoId) {
                document.getElementById('track-art').src = `https://img.youtube.com/vi/${videoId}/0.jpg`;
            }
            
            renderPlaylist();
            // В Mini App мы не можем играть аудио напрямую с YouTube из-за политик, 
            // поэтому кнопка Play будет открывать ссылку, но мы подготовили интерфейс
            isPlaying = true;
            document.getElementById('play-btn').innerText = '⏸';
        }

        function togglePlay() {
            if(songs.length === 0) return;
            window.open(songs[currentIndex].url, '_blank');
        }

        function nextTrack() {
            if(currentIndex < songs.length - 1) selectTrack(currentIndex + 1);
            else selectTrack(0);
        }

        function prevTrack() {
            if(currentIndex > 0) selectTrack(currentIndex - 1);
            else selectTrack(songs.length - 1);
        }

        loadSongs();
    </script>
</body>
</html>
