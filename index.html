<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0a1e; color: #e0d7f7; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .title { color: #a29bfe; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .playlist { width: 100%; }
        .track { background: #1c1433; border: 1px solid #3d2e6e; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .play-btn { background: #6c5ce7; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="title">Violet Player 🎧</div>
    <div class="playlist" id="list">
        <div class="track">
            <span>Загрузить мой плейлист</span>
            <button class="play-btn" onclick="sendAction('load_playlist')">GO</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendAction(action) {
            // Отправляем боту команду
            tg.sendData(action);
        }
    </script>
</body>
</html>
