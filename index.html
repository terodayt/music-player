<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0a1e; color: #e0d7f7; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .title { color: #a29bfe; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .card { background: #1c1433; border: 1px solid #3d2e6e; border-radius: 15px; padding: 20px; width: 90%; text-align: center; }
        .btn { background: #6c5ce7; color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="title">Violet Player 🎧</div>
    <div class="card">
        <p>Плейлист успешно подключен!</p>
        <button class="btn" onclick="window.Telegram.WebApp.close()">ЗАКРЫТЬ</button>
    </div>
    <script>
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
