<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Violet Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0a1e; color: #e0d7f7; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .title { color: #a29bfe; font-size: 24px; font-weight: bold; margin: 20px 0; text-shadow: 0 0 10px rgba(162, 155, 254, 0.5); }
        .playlist { width: 100%; max-width: 400px; }
        .track { background: #1c1433; border: 1px solid #3d2e6e; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .play-btn { background: #6c5ce7; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; width: 100%; }
        .play-btn:active { transform: scale(0.95); background: #5649c1; }
        p { font-size: 14px; opacity: 0.8; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="title">Violet Player 🎧</div>
    
    <div class="playlist">
        <div class="track">
            <p>Нажми на кнопку ниже, чтобы отправить запрос боту на загрузку новой музыки.</p>
            <button class="play-btn" onclick="sendAction('load_playlist')">ДОБАВИТЬ ПЕСНЮ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function sendAction(action) {
            tg.sendData(action); // Отправляет данные боту и закрывает окно
        }
    </script>
</body>
</html>
