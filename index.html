<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0a1e; color: #e0d7f7; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 350px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #1c1433; border-radius: 12px; cursor: pointer; border: 1px solid #3d2e6e; }
        .tab.active { background: #a29bfe; color: #0f0a1e; border-color: #a29bfe; }
        
        .player-card { background: #1c1433; width: 100%; max-width: 350px; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; }
        #art { width: 140px; height: 140px; border-radius: 15px; object-fit: cover; background: #3d2e6e; }
        
        .list { width: 100%; max-width: 350px; }
        .item { background: #16102b; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid #2d244a; }
        .item-info { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; }
        .plus-btn { color: #a29bfe; font-size: 24px; padding: 0 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" id="tab1" onclick="switchTab(1)">Моя Музыка</div>
        <div class="tab" id="tab2" onclick="switchTab(2)">Лента (Сайт)</div>
    </div>

    <div class="player-card" id="player-ui">
        <img id="art" src="">
        <div id="track-title" style="margin: 15px 0; font-weight: bold;">Выбери трек</div>
        <audio id="audio-player" controls style="width: 100%; height: 35px;"></audio>
    </div>

    <div class="list" id="content-list"></div>

    <script>
        const tg = window.Telegram.WebApp;
        let mySongs = [], feedSongs = [], currentTab = 1;
        const player = document.getElementById('audio-player');

        // Список треков с твоего сайта (пример парсинга)
        const SITE_URL = "https://share.google/GTvLDGLpnJf8R2KMp";

        async function loadMyMusic() {
            const r = await fetch('songs.json?v=' + Date.now());
            mySongs = await r.json();
            if(currentTab === 1) render(mySongs);
        }

        function loadFeed() {
            // Здесь имитация того, что мы нашли на сайте
            feedSongs = [
                { title: "Эстетика 00-х (Трек 1)", url: SITE_URL, thumb: "https://via.placeholder.com/50/a29bfe/ffffff?text=00s" },
                { title: "Dota 2 Phonk", url: SITE_URL, thumb: "https://via.placeholder.com/50/a29bfe/ffffff?text=Dota" }
            ];
            if(currentTab === 2) render(feedSongs);
        }

        function render(data) {
            const container = document.getElementById('content-list');
            container.innerHTML = '';
            data.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="item-info" onclick="play(${i})"><b>${s.title}</b></div>
                    ${currentTab === 2 ? `<div class="plus-btn" onclick="addToCloud('${s.url}')">➕</div>` : ''}
                `;
                container.appendChild(div);
            });
        }

        function play(i) {
            const list = currentTab === 1 ? mySongs : feedSongs;
            document.getElementById('track-title').innerText = list[i].title;
            document.getElementById('art').src = list[i].thumb;
            player.src = list[i].url;
            player.play();
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tab1').className = t === 1 ? 'tab active' : 'tab';
            document.getElementById('tab2').className = t === 2 ? 'tab active' : 'tab';
            t === 1 ? render(mySongs) : loadFeed();
        }

        function addToCloud(url) {
            tg.sendData("cloud_" + url);
            tg.showAlert("Эрика скачивает трек в Telegram! Подожди немного...");
        }

        loadMyMusic();
        loadFeed();
    </script>
</body>
</html>
