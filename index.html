<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Violet Player</title>
    <style>
        body { background: #0f0a1e; color: #e0d7f7; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1c1433; width: 100%; max-width: 350px; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #art { width: 150px; height: 150px; border-radius: 15px; background: #3d2e6e; object-fit: cover; margin-bottom: 15px; }
        .controls { display: flex; justify-content: center; gap: 20px; align-items: center; margin-top: 10px; }
        .btn { background: none; border: none; color: #a29bfe; font-size: 30px; cursor: pointer; }
        .playlist { width: 100%; max-width: 350px; margin-top: 20px; }
        .item { background: #16102b; padding: 10px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid #2d244a; }
        .item img { width: 45px; height: 45px; border-radius: 8px; margin-right: 12px; }
        .item-info { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .del-btn { color: #ff7675; font-size: 20px; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <img id="art" src="">
        <div id="track-title" style="font-weight: bold; margin-bottom: 15px;">Загрузка плейлиста...</div>
        <audio id="audio-player"></audio>
        <div class="controls">
            <button class="btn" onclick="prev()">⏮</button>
            <button class="btn" id="playBtn" onclick="toggle()" style="font-size: 45px;">▶️</button>
            <button class="btn" onclick="next()">⏭</button>
        </div>
    </div>
    <div class="playlist" id="list-container"></div>

    <script>
        let songs = [], cur = 0;
        const player = document.getElementById('audio-player');

        async function init() {
            const r = await fetch('songs.json?v=' + Date.now());
            songs = await r.json();
            if(songs.length > 0) { render(); setTrack(0, false); }
        }

        function render() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            songs.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <img src="${s.thumb}" onclick="setTrack(${i}, true)">
                    <div class="item-info" onclick="setTrack(${i}, true)">${s.title}</div>
                    <div class="del-btn" onclick="removeTrack(${i})">🗑</div>
                `;
                container.appendChild(div);
            });
        }

        function setTrack(i, play) {
            cur = i;
            document.getElementById('track-title').innerText = songs[i].title;
            document.getElementById('art').src = songs[i].thumb;
            player.src = songs[i].url;
            if(play) { player.play(); document.getElementById('playBtn').innerText = '⏸'; }
        }

        function toggle() {
            if(player.paused) { player.play(); document.getElementById('playBtn').innerText = '⏸'; }
            else { player.pause(); document.getElementById('playBtn').innerText = '▶️'; }
        }

        function next() { setTrack((cur + 1) % songs.length, true); }
        function prev() { setTrack((cur - 1 + songs.length) % songs.length, true); }

        // Новая функция: удаление через GET-запрос к боту (без закрытия)
        function removeTrack(i) {
            if(confirm("Удалить этот трек?")) {
                // Мы просто убираем его из списка на экране сразу
                const name = songs[i].title;
                songs.splice(i, 1);
                render();
                // И сообщаем пользователю, что нужно отправить команду боту
                alert("Трек убран из списка. Чтобы он удалился навсегда, напиши боту: /del_" + i);
            }
        }

        init();
    </script>
</body>
</html>
