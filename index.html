<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0a1e; color: #e0d7f7; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .player-card { 
            background: linear-gradient(145deg, #1c1433, #251b47); width: 100%; max-width: 350px; 
            border-radius: 25px; padding: 25px; text-align: center; margin-bottom: 20px;
        }
        #track-art { width: 180px; height: 180px; border-radius: 20px; object-fit: cover; background: #3d2e6e; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; }
        .btn-ctrl { background: none; border: none; color: #a29bfe; font-size: 30px; cursor: pointer; }
        .play-pause { font-size: 50px; }
        .playlist { width: 100%; max-width: 350px; }
        .track-item { 
            background: rgba(28, 20, 51, 0.6); border: 1px solid #3d2e6e; padding: 12px; 
            border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; cursor: pointer;
        }
        .track-item.active { border-color: #a29bfe; }
    </style>
</head>
<body>

    <div class="player-card">
        <img id="track-art" src="https://via.placeholder.com/180?text=Violet" alt="Art">
        <div id="track-name" style="margin-top:15px; font-weight:bold;">Выберите трек</div>
        
        <audio id="main-audio" src=""></audio>

        <div class="controls">
            <button class="btn-ctrl" onclick="prevTrack()">⏮</button>
            <button class="btn-ctrl play-pause" id="play-btn" onclick="togglePlay()">▶️</button>
            <button class="btn-ctrl" onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <div class="playlist" id="playlist-container"></div>

    <script>
        let tg = window.Telegram.WebApp;
        let songs = [];
        let currentIndex = 0;
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');

        function loadSongs() {
            fetch('songs.json?v=' + Math.random())
                .then(res => res.json())
                .then(data => {
                    songs = data;
                    if(songs.length > 0) selectTrack(0, false);
                    renderPlaylist();
                });
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = '';
            songs.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `track-item ${index === currentIndex ? 'active' : ''}`;
                item.onclick = () => selectTrack(index, true);
                item.innerHTML = `<span style="font-size:14px;">${song.title}</span>`;
                container.appendChild(item);
            });
        }

        function selectTrack(index, shouldPlay) {
            currentIndex = index;
            const song = songs[currentIndex];
            document.getElementById('track-name').innerText = song.title;
            
            // Пытаемся получить обложку
            const videoId = song.url.split('v=')[1]?.split('&')[0];
            if(videoId) document.getElementById('track-art').src = `https://img.youtube.com/vi/${videoId}/0.jpg`;

            // ВАЖНО: Здесь должна быть прямая ссылка на файл. 
            // Пока бот шлет ссылки на YouTube, кнопка всё равно будет открывать их.
            audio.src = song.url; 
            
            renderPlaylist();
            if(shouldPlay) togglePlay();
        }

        function togglePlay() {
            if (audio.paused) {
                // Если это ссылка на YouTube, браузер не сможет её "проиграть" как файл
                if(songs[currentIndex].url.includes('youtube.com')) {
                    window.open(songs[currentIndex].url, '_blank');
                } else {
                    audio.play();
                    playBtn.innerText = '⏸';
                }
            } else {
                audio.pause();
                playBtn.innerText = '▶️';
            }
        }

        function nextTrack() { if(currentIndex < songs.length - 1) selectTrack(currentIndex + 1, true); }
        function prevTrack() { if(currentIndex > 0) selectTrack(currentIndex - 1, true); }

        loadSongs();
    </script>
</body>
</html>
