<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e14; color: #f0f0f0; font-family: sans-serif; padding: 15px; margin: 0; }
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #2d3139; background: #1a1d23; color: white; }
        button { padding: 10px; border-radius: 10px; background: #a29bfe; border: none; font-weight: bold; }
        
        .tabs { display: flex; background: #1a1d23; border-radius: 12px; padding: 4px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; border-radius: 10px; color: #6c757d; }
        .tab.active { background: #a29bfe; color: #0b0e14; font-weight: bold; }

        .player { background: #1a1d23; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #2d3139; margin-bottom: 20px; }
        audio { width: 100%; margin-top: 15px; }
        
        .track { background: #1a1d23; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid #2d3139; }
        .info { flex: 1; }
        .add { color: #a29bfe; font-size: 24px; padding: 0 10px; }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="si" placeholder="Название песни или артист...">
        <button onclick="doSearch()">Найти</button>
    </div>

    <div class="tabs">
        <div class="tab active" id="b1" onclick="sm(1)">Лента ВК</div>
        <div class="tab" id="b2" onclick="sm(2)">Облако TG</div>
    </div>

    <div class="player">
        <div id="cur-t" style="font-weight: bold;">Выбери музыку</div>
        <audio id="audio" controls></audio>
    </div>

    <div id="list"></div>

    <script>
        const tg = window.Telegram.WebApp;
        let songs = [], mode = 1;

        async function load() {
            const r = await fetch('songs.json?v=' + Date.now());
            songs = await r.json();
            render();
        }

        function render() {
            const cont = document.getElementById('list');
            cont.innerHTML = '';
            const filtered = songs.filter(s => mode === 2 ? s.is_cloud : !s.is_cloud);
            filtered.forEach(s => {
                const d = document.createElement('div');
                d.className = 'track';
                d.innerHTML = `
                    <div class="info" onclick="play('${s.url}','${s.title}')">
                        <b>${s.title}</b><br><small>${s.artist || 'ВК'}</small>
                    </div>
                    ${mode === 1 ? `<div class="add" onclick="save('${s.url}','${s.title}','${s.artist}')">⊕</div>` : ''}
                `;
                cont.appendChild(d);
            });
        }

        function play(u, t) { document.getElementById('cur-t').innerText = t; const a = document.getElementById('audio'); a.src = u; a.play(); }
        function sm(m) { mode = m; document.getElementById('b1').className = m===1?'tab active':'tab'; document.getElementById('b2').className = m===2?'tab active':'tab'; render(); }
        
        function doSearch() {
            const q = document.getElementById('si').value;
            if(!q) return;
            tg.sendData("search_" + q);
            tg.showAlert("Эрика ищет музыку...");
        }

        function save(u, t, a) { tg.sendData(`cloud_|${u}|${t}|${a}`); tg.close(); }

        load();
        setInterval(load, 5000); // Автообновление каждые 5 сек
    </script>
</body>
</html>
